# exercise_log – Ollama LLM configuration
#
# llm.enabled      – set to false to disable all LLM queries and fall back to
#                    the pattern-only parser.
# llm.model        – Ollama model tag to use (e.g. llama3, mistral).
# llm.base_url     – base URL of the Ollama server.
# llm.response_format – how the LLM should format its answer: "json" or "csv".
# llm.max_retries  – how many extra attempts to make when the LLM response
#                    cannot be parsed (default: 2).
#
# The three prompts below are rendered with Python str.format(**vars) where
# the available variables are noted in each prompt's comment.

llm:
  enabled: true
  model: "llama3.1:8b"
  base_url: "http://192.168.0.247:11434"
  response_format: "json"   # "json" or "csv"
  max_retries: 2             # extra attempts when the LLM response cannot be parsed

prompts:
  # full_log_parse_prompt
  # Used when the pattern parser CANNOT identify the weight unit or weight
  # number.  The entire original text is sent to the LLM.
  #
  # Available variable: {text}
  # Expected response fields: exercise, weight, units, reps, sets, notes
  #   • units must be "lb" or "kg"
  #   • weight is the numeric weight value as a string (e.g. "27.5")
  #   • reps, sets, notes may be empty strings when unknown
  full_log_parse_prompt: |
    You are parsing noisy speech-to-text gym workout log entries.
    
    The input may be incomplete, garbled, misheard, or missing structure.
    
    Return ONLY a {response_format} object with exactly these fields:
    exercise, weight, units, reps, sets, notes
    
    Field rules:
    - exercise: a standard gym exercise name, or "" if no plausible exercise is present
    - weight: numeric string only, or ""
    - units: "lb", "kg", or ""
    - reps: integer string, or ""
    - sets: integer string, or ""
    - notes: any leftover text not captured elsewhere, or the full input if no plausible exercise is present
    
    General rules:
    - Extract as much as you can with high confidence.
    - Prefer empty fields over wrong guesses.
    - Do not invent weights or reps.
    - Default units to "lb" only if a weight is clearly present and the unit is implied.
    - If the input is not clearly a valid exercise entry, set exercise="" and put the full original text in notes.
    
    Speech-to-text normalization:
    - Correct obvious gym-related mishearings when highly confident.
    - Normalize plural/singular and word order to standard gym naming.
    - Examples of likely corrections:
      - "facebook" -> "Face Pull"
      - "face pole" -> "Face Pull"
      - "gumball pullover" -> "Dumbbell Pullover"
      - "goblin squat" -> "Goblet Squat"
      - "upright road" -> "Upright Row"
      - "lake press" -> "Leg Press"
      - "that pulled down" -> "Lat Pulldown"
      - "single weight hip thrust" -> "Single Leg Hip Thrust"
    
    Parsing rules:
    - "3×10", "3x10", "3 by 10" -> sets=3, reps=10
    - "three sets of 15" -> sets=3, reps=15
    - "three sets" -> sets=3
    - "two sets" -> sets=2
    - "ten reps" -> reps=10
    - If text contains a plausible exercise name followed by set/rep information, extract both even if weight is missing.
    - If text contains only a plausible exercise name, return that exercise and leave other fields empty.
    
    Plausibility rules:
    - A valid exercise should resemble a known gym movement or machine/cable/dumbbell/barbell exercise.
    - If the text does not resemble a gym exercise, do not force it into exercise.
    - Example: "Play Christmas Time" is not a gym exercise and should go in notes.
    
    Known exercise vocabulary examples:
    Face Pull, Dumbbell Pullover, Goblet Squat, Romanian Deadlift, Lat Pulldown, Upright Row, Shoulder Press, Dumbbell Shoulder Press, Leg Press, Tricep Pushdown, Incline Bench Press, Step Up, Single Leg Hip Thrust
    
    Output must be valid {response_format} and contain no extra text.
    
    Log entry: {text}

  # identify_exercise_prompt
  # Used when the pattern parser DID successfully identify a weight so we have
  # a (possibly garbled) exercise name.  The LLM corrects speech-recognition
  # errors and returns the most likely standard gym exercise name.
  #
  # Available variable: {exercise}
  # Expected response: a single string field "exercise" with the corrected name
  identify_exercise_prompt: |
    You normalize gym exercise names from speech-to-text.
    
    The input is only an exercise name fragment. The weight and reps have already been parsed separately.
    
    Return ONLY a {response_format} object with a single field:
    - exercise: the most likely standard gym exercise name
    
    Rules:
    - Correct obvious speech-recognition errors only when highly confident.
    - Normalize to a standard gym exercise name.
    - Reorder words into standard form when needed.
    - Do not add extra specificity unless it is strongly implied.
    - Do not invent exercise names that are not commonly used in a gym.
    - If the intended exercise is unclear, return the cleaned input text as the exercise name rather than guessing.
    - Prefer standard capitalization.
    
    Normalization examples:
    - "Facebook" -> "Face Pull"
    - "Gumball pullover" -> "Dumbbell Pullover"
    - "Goblin squat" -> "Goblet Squat"
    - "Bench press inclined" -> "Incline Bench Press"
    - "Pull down lats" -> "Lat Pulldown"
    - "Romanian dead lift" -> "Romanian Deadlift"
    - "Tricep push downs" -> "Tricep Pushdown"
    - "Step ups" -> "Step Up"
    - "Upright road" -> "Upright Row"
    
    Do not include any explanation or extra text.
    
    Input: {exercise}

  # sets_reps_notes_prompt
  # Used when the pattern parser DID successfully identify a weight.  The
  # "remainder" text (everything after the weight unit) is sent here to extract
  # sets, reps, and any notes.
  #
  # Available variable: {remainder}
  # Expected response fields: sets, reps, notes
  #   • sets and reps are integer strings or "" if unknown
  #   • notes is a string or "" if none
  sets_reps_notes_prompt: |
    You are a fitness log parser and a gym fitness trainer.  The following text is the tail of a gym
    exercise log entry that comes after the weight.  Extract the number of sets,
    the number of reps per set, and any free-text notes.  Return ONLY a
    {response_format} object with exactly these three fields:
      sets  – number of sets (integer string, or "" if unknown)
      reps  – number of reps per set (integer string, or "" if unknown)
      notes – any additional notes (string, or "" if none)
    Do not include any explanation or extra text, just the {response_format}.
    Normally sets come before reps, however the user could explicitly put reps before sets, and it's also possible that either sets or reps could be missing.
    If the user is not explicit, you can use the following to help distinguish sets from reps: Sets are maximum of 5; reps are typically 6 through 18 although in some cases reps could be higher. 

    Text: {remainder}
